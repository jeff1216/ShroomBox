name: Build Windows executable

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  HF_MODEL_REPO: Fungster/fruitbox-ppo
  HF_MODEL_REVISION: main
  HF_MODEL_FILE: fruitbox_ppo_final.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group build --no-sources

      - name: Add venv to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$env:GITHUB_WORKSPACE\.venv\Scripts"

      - name: Resolve model revision
        id: model
        shell: python
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          import os
          from huggingface_hub import HfApi

          revision = os.environ["HF_MODEL_REVISION"]
          try:
              api = HfApi(token=os.environ.get("HF_TOKEN") or None)
              info = api.repo_info(
                  os.environ["HF_MODEL_REPO"],
                  revision=revision,
              )
              sha = info.sha
          except Exception as exc:
              print(f"Could not resolve Hugging Face revision ({exc}); using {revision!r} for cache key")
              sha = revision

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"sha={sha}\n")

      - uses: actions/cache@v4
        id: model-cache
        with:
          path: fruitbox_ppo_final.zip
          key: hf-model-${{ env.HF_MODEL_REPO }}-${{ steps.model.outputs.sha }}

      - name: Download trained model
        if: steps.model-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRUITBOX_MODEL_MIRROR_URL: ${{ secrets.FRUITBOX_MODEL_MIRROR_URL }}
        run: python .github/scripts/download_hf_model.py

      - name: Build executable
        run: |
          uv run --extra cpu python -m PyInstaller --onefile --windowed --name FruitBox `
            --add-data "fruitbox_ppo_final.zip;." `
            --add-data "src/fruitbox/assets;assets" `
            --collect-data pygame_gui `
            --collect-data stable_baselines3 `
            --collect-data sb3_contrib `
            --add-binary "C:\Windows\System32\VCRUNTIME140.dll;." `
            --add-binary "C:\Windows\System32\VCRUNTIME140_1.dll;." `
            src/fruitbox/__main__.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: FruitBox-windows
          path: dist/FruitBox.exe

      - name: Publish commit release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $buildTag = "build-$shortSha"
          $commitUrl = "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if (-not (git rev-parse -q --verify "refs/tags/$buildTag")) {
            git tag -a $buildTag -m "Windows build for ${{ github.sha }}" ${{ github.sha }}
            git push origin $buildTag
          }

          git tag -fa latest -m "Latest Windows build ($buildTag)" ${{ github.sha }}
          git push -f origin latest

          $releaseNotes = @"
          Automated Windows build from ``${{ github.ref_name }}`` @ [$shortSha]($commitUrl).

          Download this build: [$buildTag](${{ github.server_url }}/${{ github.repository }}/releases/tag/$buildTag)
          "@

          gh release view $buildTag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $buildTag dist/FruitBox.exe --clobber
            gh release edit $buildTag --latest --prerelease=false --notes $releaseNotes
          } else {
            gh release create $buildTag dist/FruitBox.exe `
              --title "Build $shortSha" `
              --notes $releaseNotes `
              --latest
          }

      - name: Publish version release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FruitBox.exe
          generate_release_notes: true
