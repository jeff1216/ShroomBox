name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache ONNX model
        id: onnx-cache
        uses: actions/cache@v4
        with:
          path: web_assets/fruitbox_policy.onnx
          key: hf-onnx-${{ env.HF_MODEL_REPO }}-main
        env:
          HF_MODEL_REPO: Fungster/fruitbox-ppo

      - name: Download ONNX model
        if: steps.onnx-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run --with huggingface_hub python .github/scripts/download_hf_onnx.py

      - name: Build HTML5 web app
        run: uv run python tools/build_web.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
