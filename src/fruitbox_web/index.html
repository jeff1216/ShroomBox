<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fruit Box</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>

  <!-- onnxruntime-web: must load before pygbag so `ort` is in global scope -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>

  <script>
    // pyodide cannot call `new` constructors directly, so we expose helpers
    window._ort_tensor = (type, data, dims) => new ort.Tensor(type, data, dims);

    // Use WASM backend only (no WebGL needed for our simple network)
    if (typeof ort !== "undefined") {
      ort.env.wasm.numThreads = 1;
    }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>
  <!-- pygbag injects its loader script here -->
</body>
</html>
