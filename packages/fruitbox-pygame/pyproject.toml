[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fruitbox-pygame"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fruitbox-core",
    "pygame-ce",
    "pygame_gui",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fruitbox_pygame"]

[tool.hatch.build.targets.wheel.force-include]
"src/fruitbox_pygame/assets" = "fruitbox_pygame/assets"
