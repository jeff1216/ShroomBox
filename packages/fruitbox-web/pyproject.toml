[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fruitbox-web"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fruitbox-app-onnx",
    "fruitbox-core",
    "fruitbox-pygame",
    "onnxruntime",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fruitbox_web"]
