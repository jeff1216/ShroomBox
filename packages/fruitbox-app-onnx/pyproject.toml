[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fruitbox-app-onnx"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fruitbox-core",
    "fruitbox-pygame",
    "onnxruntime",
]

[project.scripts]
fruitbox-onnx = "fruitbox_app_onnx.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/fruitbox_app_onnx"]
